<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nancy's Health Dashboard</title>
<link rel="icon" href="data:,">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif;
}

.dash {
  max-width: 960px;
  margin: 0 auto;
  padding: 24px 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 24px;
}

.header h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

.updated {
  font-size: 12px;
  color: #6b7280;
}

.stale { color: #ef4444; }

/* ── Rings ── */
.rings-row {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.ring-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.ring-pos { position: relative; }

.ring-svg {
  transform: rotate(-90deg);
  display: block;
}

.ring-track {
  fill: none;
  stroke: #1e2a38;
  stroke-width: 11;
}

.ring-fill {
  fill: none;
  stroke-width: 11;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);
}

.ring-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
}

.ring-val {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  line-height: 1.2;
  white-space: nowrap;
}

.ring-label { text-align: center; }

.ring-name {
  font-size: 10px;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

.ring-sub {
  font-size: 10px;
  color: #4b5563;
  margin-top: 1px;
}

/* ── Stat cards ── */
.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #6b7280;
  margin-bottom: 12px;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}

.stat-card {
  background: #141c26;
  border-radius: 12px;
  padding: 14px 12px;
}

.stat-label {
  font-size: 10px;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.stat-val {
  font-size: 22px;
  font-weight: 600;
  line-height: 1;
}

.stat-unit {
  font-size: 12px;
  color: #6b7280;
  font-weight: 400;
  margin-left: 2px;
}

.stat-null {
  font-size: 14px;
  color: #4b5563;
}

/* ── Trend charts ── */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.chart-card {
  background: #141c26;
  border-radius: 12px;
  padding: 14px;
}

.chart-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #6b7280;
  margin-bottom: 10px;
}

.chart-wrap {
  position: relative;
  height: 120px;
}

@media (max-width: 520px) {
  .charts-grid { grid-template-columns: 1fr; }
}

/* ── Compact mode (?compact=1) ── */
body.compact .dash        { padding: 12px 14px; }
body.compact .header      { margin-bottom: 14px; }
body.compact .rings-row   { gap: 12px; margin-bottom: 14px; }
body.compact .ring-svg    { width: 80px; height: 80px; }
body.compact .ring-val    { font-size: 11px; }
body.compact .ring-name   { font-size: 9px; }
body.compact .ring-sub    { font-size: 9px; }
body.compact .cards-grid  { gap: 7px; margin-bottom: 14px; }
body.compact .stat-card   { padding: 9px 10px; border-radius: 10px; }
body.compact .stat-label  { font-size: 9px; margin-bottom: 4px; }
body.compact .stat-val    { font-size: 17px; }
body.compact .stat-unit   { font-size: 11px; }
body.compact .stat-null   { font-size: 12px; }
body.compact .section-title { margin-bottom: 8px; }
body.compact .charts-grid { gap: 9px; }
body.compact .chart-card  { padding: 10px; border-radius: 10px; }
body.compact .chart-title { margin-bottom: 6px; }
body.compact .chart-wrap  { height: 85px; }
</style>
</head>
<body>

<div class="dash">

  <div class="header">
    <h1>Nancy's Health</h1>
    <span class="updated" id="updatedLabel">loading…</span>
  </div>

  <!-- Activity Rings -->
  <div class="rings-row" id="ringsRow"></div>

  <!-- Today's stats -->
  <p class="section-title">Today</p>
  <div class="cards-grid">
    <div class="stat-card">
      <div class="stat-label">Steps</div>
      <div class="stat-val" id="sSteps">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Miles</div>
      <div class="stat-val" id="sMiles">--<span class="stat-unit">mi</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Heart rate</div>
      <div class="stat-val" id="sHR">--<span class="stat-unit">bpm</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Resting HR</div>
      <div class="stat-val" id="sRHR">--<span class="stat-unit">bpm</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">HRV</div>
      <div class="stat-val" id="sHRV">--<span class="stat-unit">ms</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Blood oxygen</div>
      <div class="stat-val" id="sO2">--<span class="stat-unit">%</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Sleep</div>
      <div class="stat-val" id="sSleep"><span class="stat-null">not tracked</span></div>
    </div>
  </div>

  <!-- 7-day trends -->
  <p class="section-title" style="margin-top: 8px;">7-day trends</p>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">Steps</div>
      <div class="chart-wrap">
        <canvas id="cSteps" role="img" aria-label="Steps over the last 7 days"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Exercise minutes</div>
      <div class="chart-wrap">
        <canvas id="cExercise" role="img" aria-label="Exercise minutes over the last 7 days"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Resting heart rate</div>
      <div class="chart-wrap">
        <canvas id="cRHR" role="img" aria-label="Resting heart rate over the last 7 days"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Sleep</div>
      <div class="chart-wrap">
        <canvas id="cSleep" role="img" aria-label="Total sleep hours over the last 7 days"></canvas>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyILualskjRxdTfVLiDVNZ-kBT1TwtLgwi8eay-DLH0MrXHC0OlQe_BmzHCtbrd7YQKTQ/exec";

// ── Ring definitions ──────────────────────────────────────────────────────────

const RINGS = [
  {
    key: 'activeEnergy',
    label: 'Move',
    goal: 500,
    color: '#ff2d55',
    fmt: v => Math.round(v) + ' cal'
  },
  {
    key: 'exerciseMinutes',
    label: 'Exercise',
    goal: 30,
    color: '#30d158',
    fmt: v => Math.round(v) + ' min'
  },
  {
    key: 'standHours',
    label: 'Stand',
    goal: 12,
    color: '#5ac8fa',
    fmt: v => Math.round(v) + ' hr'
  },
];

const RING_R    = 44;
const RING_CX   = 52;
const RING_CY   = 52;
const RING_CIRC = 2 * Math.PI * RING_R;

// ── Build ring DOM ────────────────────────────────────────────────────────────

function buildRings() {
  const row = document.getElementById('ringsRow');
  RINGS.forEach(ring => {
    const goalDisplay = ring.goal >= 1000 ? (ring.goal / 1000) + 'k' : ring.goal;
    const wrap = document.createElement('div');
    wrap.className = 'ring-wrap';
    wrap.innerHTML = `
      <div class="ring-pos">
        <svg class="ring-svg" width="104" height="104" viewBox="0 0 104 104" id="rsvg_${ring.key}">
          <circle class="ring-track" cx="${RING_CX}" cy="${RING_CY}" r="${RING_R}"/>
          <circle id="rf_${ring.key}" class="ring-fill"
            cx="${RING_CX}" cy="${RING_CY}" r="${RING_R}"
            stroke="${ring.color}"
            stroke-dasharray="${RING_CIRC}"
            stroke-dashoffset="${RING_CIRC}"/>
        </svg>
        <div class="ring-center">
          <div class="ring-val" id="rv_${ring.key}">--</div>
        </div>
      </div>
      <div class="ring-label">
        <div class="ring-name">${ring.label}</div>
        <div class="ring-sub">goal ${goalDisplay}</div>
      </div>`;
    row.appendChild(wrap);
  });
}

function animateRing(key, value, goal) {
  const pct = Math.min(1, Math.max(0, value / goal));
  const el  = document.getElementById('rf_' + key);
  if (el) el.style.strokeDashoffset = RING_CIRC - pct * RING_CIRC;
}

// ── Chart helpers ─────────────────────────────────────────────────────────────

Chart.defaults.color          = '#6b7280';
Chart.defaults.font.family    = '-apple-system, BlinkMacSystemFont, Arial, sans-serif';
Chart.defaults.font.size      = 11;

const GRID_COLOR = '#1e2a38';
const TICK_COLOR = '#6b7280';

function barChart(id, labels, data, color, goalLine) {
  const ctx = document.getElementById(id);
  if (!ctx) return;

  const last = data.length - 1;

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: data.map((_, i) => i === last ? color + 'cc' : color + '55'),
        borderColor:     data.map((_, i) => i === last ? color       : color + '88'),
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => ' ' + Math.round(ctx.parsed.y).toLocaleString() }
        }
      },
      scales: {
        x: {
          grid: { color: GRID_COLOR },
          ticks: { color: TICK_COLOR, maxRotation: 0 }
        },
        y: {
          grid: { color: GRID_COLOR },
          ticks: { color: TICK_COLOR, maxTicksLimit: 4,
            callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v
          },
          min: 0,
          suggestedMax: goalLine ? Math.max(goalLine, ...data) * 1.15 : undefined,
        }
      }
    }
  });
}

function lineChart(id, labels, data, color) {
  const ctx     = document.getElementById(id);
  if (!ctx) return;

  const allZero = data.every(v => !v || v === 0);

  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: allZero ? new Array(data.length).fill(null) : data,
        borderColor:     color,
        backgroundColor: color + '22',
        fill: true,
        tension: 0.35,
        pointRadius: 3,
        pointBackgroundColor: color,
        borderWidth: 2,
        spanGaps: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => ctx.parsed.y != null ? ' ' + ctx.parsed.y.toFixed(1) : ' no data' }
        }
      },
      scales: {
        x: {
          grid: { color: GRID_COLOR },
          ticks: { color: TICK_COLOR, maxRotation: 0 }
        },
        y: {
          grid: { color: GRID_COLOR },
          ticks: { color: TICK_COLOR, maxTicksLimit: 4 },
          min: allZero ? 0 : undefined,
        }
      }
    }
  });
}

// ── DOM helpers ───────────────────────────────────────────────────────────────

function setText(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

function timeSince(isoStr) {
  if (!isoStr) return 'unknown';
  const diff = Math.floor((Date.now() - new Date(isoStr)) / 60000);
  if (diff < 1)  return 'just now';
  if (diff < 60) return diff + 'm ago';
  const h = Math.floor(diff / 60);
  const m = diff % 60;
  return h + 'h ' + m + 'm ago';
}

// ── Main load ─────────────────────────────────────────────────────────────────

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const d   = await res.json();

    if (d.error) {
      document.getElementById('updatedLabel').textContent = 'Error: ' + d.error;
      return;
    }

    // Freshness label
    const diffMins = d.lastUpdated
      ? Math.floor((Date.now() - new Date(d.lastUpdated)) / 60000)
      : 999;
    const stale = diffMins > 30;
    document.getElementById('updatedLabel').innerHTML =
      `<span class="${stale ? 'stale' : ''}">Updated ${timeSince(d.lastUpdated)}</span>`;

    // Rings
    RINGS.forEach(ring => {
      const val = d[ring.key] || 0;
      animateRing(ring.key, val, ring.goal);
      document.getElementById('rv_' + ring.key).textContent = ring.fmt(val);
    });

    // Stat cards
    const stepsVal = d.steps || 0;
    setText('sSteps', stepsVal >= 1000
      ? `${(stepsVal / 1000).toFixed(1)}<span class="stat-unit">k</span>`
      : String(Math.round(stepsVal)));
    setText('sHR',  `${d.heartRate  || '--'}<span class="stat-unit">bpm</span>`);
    setText('sRHR', `${d.restingHeartRate || '--'}<span class="stat-unit">bpm</span>`);
    setText('sHRV', `${d.hrv        || '--'}<span class="stat-unit">ms</span>`);
    setText('sO2',  `${d.bloodOxygen || '--'}<span class="stat-unit">%</span>`);
    setText('sMiles', `${Number(d.distance || 0).toFixed(2)}<span class="stat-unit">mi</span>`);

    const sleep = d.sleep;
    if (!sleep || sleep === 0) {
      setText('sSleep', '<span class="stat-null">not tracked</span>');
    } else {
      const h = Math.floor(sleep);
      const m = Math.round((sleep - h) * 60);
      setText('sSleep', `${h}<span class="stat-unit">h</span> ${m}<span class="stat-unit">m</span>`);
    }

    // Trend charts
    const t      = d.trend || {};
    const labels = t.labels || [];

    barChart( 'cSteps',    labels, t.steps            || [], '#30d158', 10000);
    barChart( 'cExercise', labels, t.exerciseMinutes   || [], '#ff9f0a', 30);
    lineChart('cRHR',      labels, t.restingHeartRate  || [], '#ff2d55');
    lineChart('cSleep',    labels, t.sleep             || [], '#0a84ff');

  } catch (err) {
    console.error('Health API error:', err);
    document.getElementById('updatedLabel').innerHTML =
      '<span class="stale">Connection error — retrying…</span>';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────

buildRings();
loadData();
setInterval(loadData, 60000);


// ── Compact mode ─────────────────────────────────────────────────────────────
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('compact') === '1') {
    document.body.classList.add('compact');
  }
})();

</script>
</body>
</html>
