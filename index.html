<!DOCTYPE html>
<html>
<head>
  <title>Apple Health Dashboard</title>
  <style>
    body { font-family: Arial; background:#0b0f14; color:white; padding:20px; }
    .card { background:#141c26; padding:10px; margin:10px 0; border-radius:8px; }
    pre { white-space: pre-wrap; }
  </style>
</head>

<body>

<h2>Apple Health DEBUG</h2>

<div class="card">Steps: <span id="steps">--</span></div>
<div class="card">Heart Rate: <span id="heartRate">--</span></div>
<div class="card">Energy: <span id="energy">--</span></div>
<div class="card">Distance: <span id="distance">--</span></div>

<div class="card">
  <h3>RAW RESPONSE</h3>
  <pre id="raw"></pre>
</div>

<div class="card">
  <h3>LATEST ROW</h3>
  <pre id="latest"></pre>
</div>

<div id="error" style="color:red;"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyILualskjRxdTfVLiDVNZ-kBT1TwtLgwi8eay-DLH0MrXHC0OlQe_BmzHCtbrd7YQKTQ/exec";

async function loadData() {
  try {

    console.log("Fetching:", API_URL);

    const res = await fetch(API_URL);
    const text = await res.text();

    console.log("RAW TEXT:", text);

    const data = JSON.parse(text);

    console.log("PARSED:", data);

    const latest = Array.isArray(data)
      ? data[data.length - 1]
      : data;

    console.log("LATEST:", latest);

    document.getElementById("steps").textContent = latest.steps ?? 0;
    document.getElementById("heartRate").textContent = latest.heartRate ?? 0;
    document.getElementById("energy").textContent = latest.activeEnergy ?? 0;
    document.getElementById("distance").textContent = latest.distance ?? 0;

    document.getElementById("raw").textContent =
      JSON.stringify(data, null, 2);

    document.getElementById("latest").textContent =
      JSON.stringify(latest, null, 2);

  } catch (err) {
    console.error(err);
    document.getElementById("error").textContent =
      "ERROR loading API — check console";
  }
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
