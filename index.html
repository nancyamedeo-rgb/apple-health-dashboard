<!DOCTYPE html>
<html>
<head>
  <title>Apple Health Dashboard</title>
</head>

<body style="background:#0b0f14;color:white;font-family:Arial;padding:20px">

<h2>Apple Health Dashboard</h2>

<div>Steps: <span id="steps">--</span></div>
<div>Heart Rate: <span id="heartRate">--</span></div>
<div>Energy: <span id="energy">--</span></div>
<div>Distance: <span id="distance">--</span></div>

<pre id="raw"></pre>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyILualskjRxdTfVLiDVNZ-kBT1TwtLgwi8eay-DLH0MrXHC0OlQe_BmzHCtbrd7YQKTQ/exec";

function loadData() {

  const script = document.createElement("script");

  script.src = API_URL + "?callback=handleData";

  document.body.appendChild(script);
}

function handleData(data) {

  console.log("DATA:", data);

  document.getElementById("steps").innerText = data.steps;
  document.getElementById("heartRate").innerText = data.heartRate;
  document.getElementById("energy").innerText = data.activeEnergy;
  document.getElementById("distance").innerText = data.distance;

  document.getElementById("raw").innerText =
    JSON.stringify(data, null, 2);
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
