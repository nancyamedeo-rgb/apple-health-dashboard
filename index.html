<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apple Health Debug Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: white;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      font-size: 20px;
    }

    .card {
      background: #141c26;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .label {
      font-size: 12px;
      opacity: 0.7;
    }

    .value {
      font-size: 22px;
      margin-top: 5px;
    }

    pre {
      background: #111822;
      padding: 10px;
      border-radius: 10px;
      overflow-x: auto;
      font-size: 12px;
      max-height: 300px;
    }

    .error {
      color: #ff6b6b;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Apple Health DEBUG Dashboard</h1>

    <div class="card">
      <div class="label">Steps</div>
      <div class="value" id="steps">--</div>
    </div>

    <div class="card">
      <div class="label">Heart Rate</div>
      <div class="value" id="heartRate">--</div>
    </div>

    <div class="card">
      <div class="label">Active Energy</div>
      <div class="value" id="energy">--</div>
    </div>

    <div class="card">
      <div class="label">Distance</div>
      <div class="value" id="distance">--</div>
    </div>

    <div class="card">
      <div class="label">RAW API RESPONSE</div>
      <pre id="raw"></pre>
    </div>

    <div class="card">
      <div class="label">LATEST ROW</div>
      <pre id="latest"></pre>
    </div>

    <div class="card error" id="error"></div>
  </div>

  <script>
    const API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

    async function loadData() {
      try {
        console.log("Fetching API:", API_URL);

        const res = await fetch(API_URL);
        const data = await res.json();

        console.log("RAW API RESPONSE:", data);

        const latest = Array.isArray(data)
          ? data[data.length - 1]
          : data;

        console.log("LATEST ROW:", latest);

        // Update UI
        document.getElementById("steps").textContent = latest.steps ?? 0;
        document.getElementById("heartRate").textContent = latest.heartRate ?? 0;
        document.getElementById("energy").textContent = latest.activeEnergy ?? 0;
        document.getElementById("distance").textContent = latest.distance ?? 0;

        // Debug panels
        document.getElementById("raw").textContent =
          JSON.stringify(data, null, 2);

        document.getElementById("latest").textContent =
          JSON.stringify(latest, null, 2);

      } catch (err) {
        console.error(err);
        document.getElementById("error").textContent =
          "ERROR: Failed to load API. Check console.";
      }
    }

    loadData();
    setInterval(loadData, 60000);
  </script>
</body>
</html>
