<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nancy's Apple Health Dashboard</title>

<link rel="icon" href="data:,">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial;
  background: #0b0f14;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px;
}

h1 { margin-bottom: 25px; }

/* rings */
.rings { display: flex; gap: 25px; }

.ring { width: 140px; height: 140px; position: relative; }

svg { transform: rotate(-90deg); }

.bg {
  fill: none;
  stroke: #1e2a38;
  stroke-width: 10;
}

.progress {
  fill: none;
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.8s ease;
}

.steps { stroke: #32d74b; }
.energy { stroke: #ff2d55; }
.distance { stroke: #0a84ff; }

.label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.value { font-size: 20px; font-weight: 600; }
.name { font-size: 11px; opacity: 0.6; }

.cards {
  margin-top: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 320px;
}

.card {
  background: #141c26;
  border-radius: 12px;
  padding: 12px;
  text-align: center;
}

.card-title {
  font-size: 11px;
  opacity: 0.6;
}

.card-value {
  font-size: 22px;
  font-weight: 600;
}
</style>
</head>

<body>

<h1>Apple Health Dashboard</h1>

<div class="rings">

<div class="ring">
<svg width="140" height="140">
<circle class="bg" cx="70" cy="70" r="55"/>
<circle id="stepsRing" class="progress steps" cx="70" cy="70" r="55"/>
</svg>
<div class="label">
<div class="value" id="steps">--</div>
<div class="name">STEPS</div>
</div>
</div>

<div class="ring">
<svg width="140" height="140">
<circle class="bg" cx="70" cy="70" r="55"/>
<circle id="energyRing" class="progress energy" cx="70" cy="70" r="55"/>
</svg>
<div class="label">
<div class="value" id="energy">--</div>
<div class="name">MOVE</div>
</div>
</div>

<div class="ring">
<svg width="140" height="140">
<circle class="bg" cx="70" cy="70" r="55"/>
<circle id="distanceRing" class="progress distance" cx="70" cy="70" r="55"/>
</svg>
<div class="label">
<div class="value" id="distance">--</div>
<div class="name">MILES</div>
</div>
</div>

</div>

<div class="cards">
<div class="card">
<div class="card-title">HEART RATE</div>
<div class="card-value" id="heartRate">--</div>
</div>

<div class="card">
<div class="card-title">RESTING HR</div>
<div class="card-value" id="restingHeartRate">--</div>
</div>

<div class="card">
<div class="card-title">EXERCISE</div>
<div class="card-value" id="exerciseMinutes">--</div>
</div>

<div class="card">
<div class="card-title">STAND</div>
<div class="card-value" id="standHours">--</div>
</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyILualskjRxdTfVLiDVNZ-kBT1TwtLgwi8eay-DLH0MrXHC0OlQe_BmzHCtbrd7YQKTQ/exec";

function setupRing(id) {
  const c = document.getElementById(id);
  const r = 55;
  const len = 2 * Math.PI * r;

  c.style.strokeDasharray = len;
  c.style.strokeDashoffset = len;

  return (p) => {
    const v = Math.max(0, Math.min(1, p));
    c.style.strokeDashoffset = len - v * len;
  };
}

const setSteps = setupRing("stepsRing");
const setEnergy = setupRing("energyRing");
const setDistance = setupRing("distanceRing");

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    document.getElementById("steps").textContent = data.steps || 0;
    document.getElementById("energy").textContent = data.activeEnergy || 0;
    document.getElementById("distance").textContent = (data.distance || 0).toFixed(2);

    document.getElementById("heartRate").textContent = data.heartRate || 0;
    document.getElementById("restingHeartRate").textContent = data.restingHeartRate || 0;
    document.getElementById("exerciseMinutes").textContent = data.exerciseMinutes || 0;
    document.getElementById("standHours").textContent = data.standHours || 0;

    setSteps((data.steps || 0) / 10000);
    setEnergy((data.activeEnergy || 0) / 500);
    setDistance((data.distance || 0) / 5);

  } catch (e) {
    console.error("API error:", e);
  }
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
