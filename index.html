<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apple Health Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #0b0f14;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }

    h1 {
      font-weight: 600;
      margin-bottom: 25px;
      opacity: 0.9;
    }

    /* -----------------------
       RINGS
    ------------------------ */
    .rings {
      display: flex;
      gap: 25px;
      margin-bottom: 30px;
    }

    .ring {
      width: 140px;
      height: 140px;
      position: relative;
    }

    svg {
      transform: rotate(-90deg);
    }

    .bg {
      fill: none;
      stroke: #1e2a38;
      stroke-width: 10;
    }

    .progress {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s ease;
    }

    .label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .value {
      font-size: 20px;
      font-weight: 600;
    }

    .name {
      font-size: 11px;
      opacity: 0.6;
      letter-spacing: 1px;
    }

    .move { stroke: #ff2d55; }
    .steps { stroke: #32d74b; }
    .distance { stroke: #0a84ff; }

    /* -----------------------
       HEART RATE CARD
    ------------------------ */
    .card {
      width: 320px;
      background: #141c26;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      margin-top: 10px;
    }

    .card-title {
      font-size: 12px;
      opacity: 0.6;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 34px;
      font-weight: 600;
    }

  </style>
</head>

<body>

<h1>Apple Health Dashboard</h1>

<div class="rings">

  <!-- MOVE -->
  <div class="ring">
    <svg width="140" height="140">
      <circle class="bg" cx="70" cy="70" r="55"></circle>
      <circle id="moveRing" class="progress move"
        cx="70" cy="70" r="55"></circle>
    </svg>
    <div class="label">
      <div class="value" id="energy">--</div>
      <div class="name">MOVE</div>
    </div>
  </div>

  <!-- STEPS -->
  <div class="ring">
    <svg width="140" height="140">
      <circle class="bg" cx="70" cy="70" r="55"></circle>
      <circle id="stepsRing" class="progress steps"
        cx="70" cy="70" r="55"></circle>
    </svg>
    <div class="label">
      <div class="value" id="steps">--</div>
      <div class="name">STEPS</div>
    </div>
  </div>

  <!-- DISTANCE -->
  <div class="ring">
    <svg width="140" height="140">
      <circle class="bg" cx="70" cy="70" r="55"></circle>
      <circle id="distanceRing" class="progress distance"
        cx="70" cy="70" r="55"></circle>
    </svg>
    <div class="label">
      <div class="value" id="distance">--</div>
      <div class="name">MILES</div>
    </div>
  </div>

</div>

<!-- CLEAN HEART RATE CARD -->
<div class="card">
  <div class="card-title">HEART RATE</div>
  <div class="card-value" id="heartRate">--</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyILualskjRxdTfVLiDVNZ-kBT1TwtLgwi8eay-DLH0MrXHC0OlQe_BmzHCtbrd7YQKTQ/exec";

/* -----------------------
   RING SETUP
------------------------ */
function setupRing(id) {
  const circle = document.getElementById(id);
  const radius = 55;
  const circumference = 2 * Math.PI * radius;

  circle.style.strokeDasharray = circumference;
  circle.style.strokeDashoffset = circumference;

  return function (percent) {
    const offset = circumference - percent * circumference;
    circle.style.strokeDashoffset = offset;
  };
}

const setMove = setupRing("moveRing");
const setSteps = setupRing("stepsRing");
const setDistance = setupRing("distanceRing");

function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

/* -----------------------
   DATA LOADER (JSONP)
------------------------ */
function loadData() {
  const script = document.createElement("script");
  script.src = API_URL + "?callback=handleData";
  document.body.appendChild(script);
}

function handleData(data) {

  // Update numbers
  document.getElementById("steps").textContent = Math.round(data.steps || 0);
  document.getElementById("energy").textContent = Math.round(data.activeEnergy || 0);
  document.getElementById("distance").textContent = (data.distance || 0).toFixed(2);
  document.getElementById("heartRate").textContent = Math.round(data.heartRate || 0);

  // Rings (simple scaling)
  setSteps(clamp01((data.steps || 0) / 10000));
  setMove(clamp01((data.activeEnergy || 0) / 500));
  setDistance(clamp01((data.distance || 0) / 5));
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
